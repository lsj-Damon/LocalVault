appId: com.localvault.secure-notes
productName: Local Vault
directories:
  output: release
files:
  - out/**
  - package.json
asar: true
win:
  signAndEditExecutable: false
  target:
    - nsis
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
